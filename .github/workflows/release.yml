name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Build tray app
      - name: Build tray app
        working-directory: tray
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o ../patentforgelocal-tray.exe ./cmd/tray

      # Build backend dependencies and SEA
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend SEA
        run: bash scripts/build-backend-sea.sh
        shell: bash

      # Build feasibility dependencies and SEA
      - name: Install feasibility dependencies
        working-directory: services/feasibility
        run: npm ci

      - name: Build feasibility SEA
        run: bash scripts/build-feasibility-sea.sh
        shell: bash

      # Build frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Bundle portable Python + service dependencies
      - name: Bundle Python
        run: bash scripts/bundle-python.sh windows
        shell: bash

      - name: Bundle Ollama
        run: bash scripts/bundle-ollama.sh windows
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}

      # Build installer
      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        run: bash installer/windows/build-installer.sh
        shell: bash

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/PatentForgeLocal-*-Setup.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build tray app
        working-directory: tray
        run: CGO_ENABLED=1 go build -ldflags "-X main.version=${{ github.ref_name }}" -o ../patentforgelocal-tray ./cmd/tray

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend SEA
        run: bash scripts/build-backend-sea.sh

      - name: Install feasibility dependencies
        working-directory: services/feasibility
        run: npm ci

      - name: Build feasibility SEA
        run: bash scripts/build-feasibility-sea.sh

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Bundle Python (Mac)
        run: bash scripts/bundle-python.sh mac

      - name: Bundle Ollama (Mac)
        run: bash scripts/bundle-ollama.sh mac
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create .app bundle and .dmg
        run: bash installer/mac/build-dmg.sh

      - name: Smoke-test DMG structure (structural only — not runtime)
        run: |
          set -e
          DMG_FILE=$(ls build/PatentForgeLocal-*.dmg | head -1)
          echo "Found DMG: $DMG_FILE"
          MOUNT_DIR=$(mktemp -d)
          hdiutil attach "$DMG_FILE" -mountpoint "$MOUNT_DIR" -nobrowse -quiet
          APP_PATH=$(ls -d "$MOUNT_DIR"/*.app | head -1)
          echo "App: $APP_PATH"
          EXEC_NAME=$(defaults read "$APP_PATH/Contents/Info" CFBundleExecutable)
          echo "CFBundleExecutable: $EXEC_NAME"
          WRAPPER="$APP_PATH/Contents/MacOS/$EXEC_NAME"
          REAL_BIN="$APP_PATH/Contents/MacOS/$EXEC_NAME-bin"
          test -f "$WRAPPER" && echo "OK: wrapper exists" || (echo "FAIL: wrapper missing" && exit 1)
          test -x "$WRAPPER" && echo "OK: wrapper is executable" || (echo "FAIL: wrapper not executable" && exit 1)
          test -f "$REAL_BIN"  && echo "OK: real binary exists" || (echo "FAIL: real binary missing" && exit 1)
          bash -n "$WRAPPER"   && echo "OK: wrapper syntax valid" || (echo "FAIL: wrapper syntax invalid" && exit 1)
          hdiutil detach "$MOUNT_DIR" -quiet
          echo "Mac DMG structural smoke test passed"

      - name: Upload Mac installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: build/PatentForgeLocal-*.dmg

  build-linux:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install systray build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev zstd libfuse2

      - name: Build tray app
        working-directory: tray
        run: CGO_ENABLED=1 go build -ldflags "-X main.version=${{ github.ref_name }}" -o ../patentforgelocal-tray ./cmd/tray

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend SEA
        run: bash scripts/build-backend-sea.sh

      - name: Install feasibility dependencies
        working-directory: services/feasibility
        run: npm ci

      - name: Build feasibility SEA
        run: bash scripts/build-feasibility-sea.sh

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Bundle Python (Linux)
        run: bash scripts/bundle-python.sh linux

      - name: Bundle Ollama (Linux)
        run: bash scripts/bundle-ollama.sh linux
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create AppImage
        run: bash installer/linux/build-appimage.sh

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/PatentForgeLocal-*.AppImage

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create draft release
        run: gh release create "${{ github.ref_name }}" --draft --generate-notes --title "PatentForgeLocal ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Windows installer
        run: gh release upload "${{ github.ref_name }}" artifacts/windows-installer/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Mac DMG
        run: gh release upload "${{ github.ref_name }}" artifacts/mac-dmg/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Linux AppImage
        run: gh release upload "${{ github.ref_name }}" artifacts/linux-appimage/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish release
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}
