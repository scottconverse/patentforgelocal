name: CI

# Preemptively opt in to Node 24 runner before June 2026 forced migration
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Lint
        run: cd backend && npm run lint

      - name: Run tests with coverage
        run: cd backend && npm run test:cov

      - name: Run integration tests
        run: cd backend && npm run test:integration

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Lint
        run: cd frontend && npm run lint

      - name: Run tests with coverage
        run: cd frontend && npm run test:cov

  claim-drafter-tests:
    name: Claim Drafter Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: cd services/claim-drafter && pip install -e ".[dev]"

      - name: Run tests
        run: cd services/claim-drafter && pytest tests/ -v

  compliance-checker-tests:
    name: Compliance Checker Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: cd services/compliance-checker && pip install -e ".[dev]"

      - name: Run tests
        run: cd services/compliance-checker && pytest tests/ -v

  application-generator-tests:
    name: Application Generator Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: cd services/application-generator && pip install -e ".[dev]"

      - name: Run tests
        run: cd services/application-generator && pytest tests/ -v

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, claim-drafter-tests, compliance-checker-tests, application-generator-tests]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and build backend
        run: cd backend && npm ci && npx prisma generate && npm run build

      - name: Install and build feasibility service
        run: cd services/feasibility && npm ci && npm run build

      - name: Install and build frontend
        run: cd frontend && npm install && npm run build

      - name: Install claim-drafter dependencies (verify pip install works)
        run: cd services/claim-drafter && pip install .

      - name: Install compliance-checker dependencies (verify pip install works)
        run: cd services/compliance-checker && pip install .

      - name: Install application-generator dependencies (verify pip install works)
        run: cd services/application-generator && pip install .

  e2e-tests:
    name: Browser E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install all Node dependencies
        run: |
          cd backend && npm ci && cd ..
          cd services/feasibility && npm ci && cd ../..
          cd frontend && npm install

      - name: Install Python service dependencies
        run: |
          cd services/claim-drafter && pip install .
          cd ../../services/compliance-checker && pip install .

      - name: Set up database
        run: |
          echo 'DATABASE_URL="file:./prisma/dev.db"' > backend/.env
          cd backend && npx prisma db push && npx prisma generate

      - name: Build services
        run: |
          cd backend && npm run build
          cd ../services/feasibility && npm run build

      - name: Install Playwright Chromium
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test --reporter=list

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/e2e-results/
